  PROMPT-5:
    start_line: 68
    path: prompts\item_crud.md#prompt-5-convert-new_item_md-objects-into-item
    level: 1
    end_line: 99
    markdown: "# PROMPT-5 Convert `new_item_md` objects into `item`\n## `Role`\nYou
      are a Senior Python Developer with extensive experience parsing and extending
      markdown. You are familiar with the `mistletoe` library for parsing and manipulating
      the AST of Markdown Documents.\n## `Goal\nCreate a function in `be/crud.py`
      that reads/parses a `new_item_md` object to convert it into our typical `item`
      object, so that we can use pass it to the `put_item()` function to actually
      write the `Item`.\n\nWe will use this so that Humans can create Items via the
      TUI.\n## `Design`\n### example `new_item_md` dict object\n```python\n{\n  \"\
      kb_path\": \"../mgmt_docs\"\n  \"filepath\": \"reqs/reqs.md\",\n  \"markdown\"\
      : \"# REQ-2 Verify Data\\n I have some content here.\"\n}\n```\n### expected
      output `item` dict object from above example\n```python\n{\n  \"path\": \"../mgmt_docs/reqs/reqs.md\"\
      ,\n  \"title\": \"# REQ-2 Verify Data\",\n  \"content\": \"I have some content
      here.\",\n  \"parent_title\": \"\" # detect parent if applicable\n}\n```\n##
      Output Summary\n- Created a `convert_new_item_md(new_item_md: dict)` function\n\
      \  - joins the `kb_path` and `file_path`\n  - Prases the markdown via a new
      helper `parse_md_text()`\n  - extracts the first heading as `title`, everything
      after it as content\n  - if the target file already exists, reads it to detect
      the last heading that would be a parent\n\n"
    title: PROMPT-5 Convert `new_item_md` objects into `item`
    data:
    key: PROMPT-5
    parent:
  PROMPT-6:
    start_line: 100
    path: prompts\item_crud.md#prompt-6-better-handling-of-item-hierarchies
    level: 1
    end_line: 116
    markdown: "# PROMPT-6 Better Handling of Item Hierarchies\n## `Role`\nYou are
      a Senior Python developer working on Shelly Docs. A TUI/CLI tool for managing
      documentation items using markdown.\n## `Background on Issue`\nOn trying to
      add an item with a key of `USECASE-77-1`, we get this error.\n```\nValueError:
      Tag 'USECASE-77' not in configured item_tags: ['USECASE', 'DESIGN', 'ACTOR']\n\
      ```\n\nIt seems that we are not correctly pattern matching to get the tag prefix.\n\
      ## `Goal`\nUpdate the pattern matching approach in `put_item()` so that the
      item type (aka `tag_prefix`) is correctly determined.\n\n## Output Summary\n\
      - replace `rsplit('-', 1)` with a loop checking if the item_key starts with
      any configured tag followed by `-`.\n- this correctly identifies the item types.\n\
      \n"
    title: PROMPT-6 Better Handling of Item Hierarchies
    data:
    key: PROMPT-6
    parent:
  PROMPT-7:
    start_line: 117
    path: 
      prompts\item_crud.md#prompt-7---items-are-written-as-heading-2s-even-if-they-are-set-at-a-different-level
    level: 1
    markdown: "# PROMPT-7 - Items are written as Heading 2s, even if they are set
      at a different level.\n## `Role`\nYou are a Senior Python developer working
      on Shelly Docs. A TUI/CLI tool for managing documentation items using markdown.\n\
      \nYou have extensive experience parsing and extending markdown. You are familiar
      with the `mistletoe` library for parsing and manipulating the AST of Markdown
      Documents.\n## `Background on Issue`\nIn Line 72 of `be/crud.py` within `put_item()`
      it looks like we are assuming that all Items should be written as Heading 2s
      (starting with '##') instead of whatever was directly in their heading.\n##
      `Goal`\nUpdate the `item` objects so that we properly store and write the heading
      levels based on what was initially written in markdown, allowing users to hierachically
      model their items.\n## Output summary\n- updated `traverse_for_items()` to store
      `level` in each item dict\n- `put_item` now uses `item.get()` to generate the
      correct heading prefix\n- `convert_new_item` captures the `level` from the parsed
      heading node and includes it in the returned dict\n\n\n"
    title: PROMPT-7 - Items are written as Heading 2s, even if they are set at a
      different level.
    data:
    key: PROMPT-7
    parent:
