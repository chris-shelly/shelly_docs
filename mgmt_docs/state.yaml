  USECASE-17:
    start_line: 155
    path: use_cases\use_cases.md#usecase-17-aggregate-queried-items
    level: 1
    markdown: "# USECASE-17 Aggregate Queried Items\n```yaml (data)\nstatus: done\n\
      related_to: DESIGN-2-2\n```\nGiven a user has queried some items, let them aggregate
      that data.\n\nFor example, if the user wants to know how many items are of a
      certain \"status\" value.\n\nHow about we enable \"pipelines\", where each part
      of the query is run in sequence.\n\n```yaml\n# status_query.yaml\n- status:
      done # gets the items that have a status done\n- $count # then, counts those
      items\n```\n\n```bash\n# query the items\nshelly-docs items query --query \"\
      $(cat status_query.yaml)\"\n\n```"
    title: USECASE-17 Aggregate Queried Items
    data:
      status: done
      related_to: DESIGN-2-2
      type: USECASE
    key: USECASE-17
    parent:
