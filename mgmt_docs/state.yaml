  PROMPT-10:
    start_line: 1
    path: prompts\data_querying.md#prompt-10-data-querying
    level: 1
    markdown: "# PROMPT-10 Data Querying\n## `Role`\nYou are a Senior Python Developer
      with experience making CLI apps that allow users to query data.\n## `Background`\n\
      You are working on Shelly Docs, a TUI/CLI app that lets users organize and analyze
      documentation in markdown files.\n### Knowledge Base\nA \"Knowledge Base\" is
      a directory users set to capture Documentation Items.\n\nConfiguration for item
      types is captured in a `shellydocs.yaml` file in the Knowledge Base directory.\n\
      \nThe Knowledge Base stores item state and metadata in the `state.yaml` file
      in the Knowledge Base directory.\n### Items\n\"Items\" are chunks of markdown
      documents, written by human or AI agent users that write sections of markdown
      starting with an item tag markdown header.\n\nEach Item may have a `yaml (data)`
      codefence for storing data about that item, useful for analyzing/querying later.\n\
      ## `Goal`\nPlan a Feature that lets users query and analyze their Shelly Docs
      Items.\n- for example, determining tasks that are in progress, requirements
      linked to specific tests, etc. \n## Example `state.yaml` file\n```yaml\nitems:\n\
      \  ABC-1:\n    start_line: 1\n    path: ..\\experiment_code\\md_data_parsing\\\
      data.md#abc-1-yo\n    level: 1\n    end_line: 9\n    markdown: \"# ABC-1 Yo\\
      nThis is a markdown document with a data block in it.\\n\\n\\\n      ```yaml
      (data)\\nfield1: yo\\nfield2: 27\\n```\\nSee ya later.\\n\\n\"\n    title: ABC-1
      Yo\n    data:\n      field1: yo\n      field2: 27\n    key: ABC-1\n    parent:\n\
      \  ABC-1-1:\n    start_line: 10\n    path: ..\\experiment_code\\md_data_parsing\\\
      data.md#abc-1-1-brodie\n    level: 2\n    end_line: 13\n    markdown: \"## ABC-1-1
      Brodie\\nKostecki be sending it down the mountain.\\n\\n\\n\"\n    title: ABC-1-1
      Brodie\n    data:\n    key: ABC-1-1\n    parent: ABC-1\n  ABC-2:\n    start_line:
      14\n    path: ..\\experiment_code\\md_data_parsing\\data.md#abc-2-hi-there\n\
      \    level: 1\n    end_line: 19\n    markdown: \"# ABC-2 Hi **`there`**\\nWhat's
      up.\\n```yaml (data)\\nfield3: bruh\\n\\\n      ```\\n\\n\"\n    title: ABC-2
      Hi **`there`**\n    data:\n      field3: bruh\n    key: ABC-2\n    parent:\n\
      \  #...\n```"
    title: PROMPT-10 Data Querying
    data:
    key: PROMPT-10
    parent:
  PROMPT-1:
    start_line: 1
    path: prompts\item_crud.md#prompt-1-reading-item-content
    level: 1
    end_line: 39
    markdown: "# PROMPT-1 Reading Item Content\n## `Role`\nYou are a Senior Python
      Developer with extensive experience parsing and extending markdown. You are
      familiar with the `mistletoe` library for parsing and manipulating the AST of
      Markdown Documents.\n## `Background on Goal`\nIn `crud.py`, we want to update
      the `get_items()` function to parse documentation Items. Letting us determine
      the `title`, `content`, and `parent_title` (if applicable).\n## `Design` - Documentation
      `Item`s\nAn `Item` is a piece of markdown documentation content within a [Knowledge
      Base](#design-1-knowledge-base).\n\nAn `Item` is defined as a markdown heading
      with content under it.\n\nFor example ...\n\n\n```md\n<!-- Item starts with
      the Heading-->\n## ABC-32 Retrieve Data\nRetrieve data so we can display it
      to the user\n<!-- Item ends either with end of the document or another Heading
      with the same or higher level -->\n<!--New Item, separate from ABC-32-->\n##
      ABC-33 Display Data\nDisplay the data to the user\n...\n```\nAside from headings
      of the same or higher level (which would indicate another `Item`), any sort
      of content can be within a given `Item`, including paragraphs, code blocks,
      images, etc.\n\n## `Goal`\nIn `crud.py`, update the `get_items()` function to
      parse documentation Items. A documentation item must be made available as json.\n\
      ```yaml\n{\n\"title\": \"ABC-32 Retrieve Data\",\n\"content\": \"Retrieve data
      so we can display it to the user\",\n\"parent_title\": \"\" #empty because there
      is no parent `Item`\n}\n```\n## ``Claude Plan``\n- Recursive traversal should
      be replaced with a linear scan approach\n- Add a `node_to_markdown` helper\n\
      - Cleaning up debug prints\n\n"
    title: PROMPT-1 Reading Item Content
    data:
    key: PROMPT-1
    parent:
  PROMPT-2:
    start_line: 40
    path: prompts\item_crud.md#prompt-2-put-items
    level: 1
    end_line: 55
    markdown: "# PROMPT-2 Put Items\n## `Role`\nYou are a Senior Python Developer
      with extensive experience parsing and extending markdown. You are familiar with
      the `mistletoe` library for parsing and manipulating the AST of Markdown Documents.\n\
      ## `Goal`\nIn `crud.py`, we want an `put_item()` function to idempotently add/update
      an item's content in the markdown document.\n\nAdd logic that ensures:\n- the
      item key is unique\n- the item type is one of the valid types defined in `shellydocs.yaml`
      config\n## `Summary of Claude's Plan`\n- replace `update_item()` stub with `put_item()`\n\
      - add validation logic\n  - type\n  - key uniqueness\n- write to markdown file,
      have to use raw text\n\n"
    title: PROMPT-2 Put Items
    data:
    key: PROMPT-2
    parent:
