  SYSTEM-1-2-1:
    start_line: 27
    path: system\cli.md#system-1-2-1-items-query
    level: 3
    end_line: 63
    markdown: "### SYSTEM-1-2-1 `items query`\n```yaml (data)\nstatus: done\n```\n\
      Recall from DESIGN-2-1 that each item has a data field for saving structured
      data.\n\nWe can query the items based on that structure data with `shelly-docs
      items query` with a Mongo-DB inspired syntax, written as YAML (and therefore,
      also can work as JSON).\n\nCan query the Knowledge base for values of certain
      types\n```yaml\n# get the items with 'status: done'\nstatus: done\n```\n\n\n\
      Keywords are prefixed with a `$` symbol.\n```yaml\n# non_done_items.yaml\n#
      get the items with a 'status' field that is not equal to done.\nstatus:\n  $ne:
      done\n```\n\nThen we can reference a file to actually run ths query from YAML.\n\
      ```bash\nshelly-docs items query --query \"$(cat non_done_items.yaml)\"\n```\n\
      \nCan make individual queries (a mapping) or can make query pipelines ( a sequence).\n\
      \nAggregations are kinds of keywords used to get scalar results (number or string).\n\
      \nAggregation Keywords include:\n- `$count`\n- `$sum`\n- `$concat`\n\n"
    title: SYSTEM-1-2-1 `items query`
    data:
      status: done
      type: SYSTEM
    key: SYSTEM-1-2-1
    parent: SYSTEM-1-2
