  USECASE-12:
    start_line: 91
    path: use_cases\use_cases.md#usecase-12-add-data-to-items
    level: 1
    end_line: 104
    markdown: "# USECASE-12 Add Data to Items\n```yaml (data)\nstatus: done\nrelated_to:
      DESIGN-2-2\n```\nAs seen above, allow Items to have structured data that can
      be analyzed and queried.\n\nData on a given item is provided using a yaml `data`
      code block.\n\nData is then saved in the state of the knowledge base, where
      the item has a field called `\"data\"`, which contains the object defined from
      the yaml code block.\n\nBy default, at least the 'type' will be added to the
      data object, but it can be overwritten by a type specified in the code fence.\n\
      \n\n"
    title: USECASE-12 Add Data to Items
    data:
      status: done
      related_to: DESIGN-2-2
      type: USECASE
    key: USECASE-12
    parent:
  USECASE-13:
    start_line: 105
    path: use_cases\use_cases.md#usecase-13-query-items-based-on-itemdata
    level: 1
    end_line: 130
    markdown: "# USECASE-13 Query Items based on `Item.data`\n```yaml (data)\nstatus:
      done\n```\nSearch for Items based on their `data` field.\nAn Item object has
      data from codefences stored in the 'data' object in the state file.\n\nWe can
      then query that data from the state file by iterating through the items and
      checking logical conditions\n\nA query can be formatted with mongodb-like objects\n\
      ```yaml\n# format\n<field>: <query_obj> # scalar for a single value, or a mapping
      for checking several conditions\n\n# query for status of done\nstatus: done\n\
      # ...\n# query conditionals\npoints:\n  $gte: 3\n  $lte: 8\n$or:\n  - status:
      drafting\n  - winner: true\n```\n\n"
    title: USECASE-13 Query Items based on `Item.data`
    data:
      status: done
      type: USECASE
    key: USECASE-13
    parent:
