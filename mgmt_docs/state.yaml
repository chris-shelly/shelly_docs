items:
  DESIGN-1:
    start_line: 1
    path: design\kb_and_item.md#design-1-knowledge-base
    level: 1
    end_line: 8
    markdown: "# DESIGN-1 Knowledge Base\n```yaml (data)\nstatus: done\n```\nThe Knowledge
      Base is the directory in which Shelly Docs is initialized.\n\nShelly Docs scans
      markdown documents within that directory to read, update, create and delete
      [`Item`s](#design-2-item).\n\n"
    title: DESIGN-1 Knowledge Base
    data:
      status: done
      type: DESIGN
    key: DESIGN-1
    parent:
  DESIGN-1-1:
    start_line: 9
    path: design\kb_and_item.md#design-1-1-knowledge-base-stateyaml
    level: 2
    end_line: 21
    markdown: "## DESIGN-1-1 Knowledge Base `state.yaml`\nWithin the Knowledge Base
      is a `state.yaml` file that stores the data on the `Item`s like a very simplistic
      kind of database collection.\n```yaml\nitems:\n  ABC-32:\n    title: \"ABC-32
      Retrieve Data\",\n    content: \"Retrieve data so we can display it to the user\"\
      ,\n    parent_title: \"\" #empty if there is no parent item\n  ABC-33:\n   \
      \ title: \"ABC-33 Display Data\"\n    # ...\n```\n\n"
    title: DESIGN-1-1 Knowledge Base `state.yaml`
    data:
    key: DESIGN-1-1
    parent: DESIGN-1
  DESIGN-2:
    start_line: 22
    path: design\kb_and_item.md#design-2-item
    level: 1
    end_line: 25
    markdown: "# DESIGN-2 `Item`\nAn `Item` is a piece of markdown documentation content
      within a [Knowledge Base](#design-1-knowledge-base).\n\nAn `Item` is defined
      as a markdown heading with content under it.\n"
    title: DESIGN-2 `Item`
    data:
    key: DESIGN-2
    parent:
  DESIGN-2-1:
    start_line: 26
    path: design\kb_and_item.md#design-2-1-item-example
    level: 2
    end_line: 38
    markdown: "## DESIGN-2-1 `Item` Example\nFor example,\n```md\n<!-- Item starts
      with the Heading-->\n## ABC-32 Retrieve Data\nRetrieve data so we can display
      itto the user\n<!-- Item ends either with end of the document or another Heading
      with the same or higher level -->\n<!--New Item, separate from ABC-32-->\n##
      ABC-33 Display Data\nDisplay the data to the user\n...\n```\nAside from headings
      of the same or higher level (which would indicate another `Item`), any sort
      of content can be within a given `Item`, including paragraphs, code blocks,
      images, etc.\n"
    title: DESIGN-2-1 `Item` Example
    data:
    key: DESIGN-2-1
    parent: DESIGN-2
  DESIGN-2-2:
    start_line: 39
    path: design\kb_and_item.md#design-2-2-itemdata
    level: 2
    end_line: 44
    markdown: "## DESIGN-2-2 `Item.data`\nAn `Item` can have structured data attached
      to it within the markdown document.\n\nA yaml code block with the `yaml (data)`
      around it is then parsed and saved alongside the item in state.\n\nThis data
      can later be queried from the `state.yaml` to provide information to the user
      about the items.\n"
    title: DESIGN-2-2 `Item.data`
    data:
    key: DESIGN-2-2
    parent: DESIGN-2
  DESIGN-2-3:
    start_line: 45
    path: design\kb_and_item.md#design-2-3-itemdatatype
    level: 2
    end_line: 52
    markdown: "## DESIGN-2-3 `Item.data.type`\n```yaml (data)\nstatus: done\ntype:
      whatever I want\n```\nBy default, the item `type` is retrieved based on the
      Item Tag of the Item's title/declaration, and then stored within the Item's
      `data` field so it can be queried.\n\nThe user can overide the ``type`` with
      whatever content they have in the fenced `yaml (data)` code block.\n"
    title: DESIGN-2-3 `Item.data.type`
    data:
      status: done
      type: whatever I want
    key: DESIGN-2-3
    parent: DESIGN-2
  DESIGN-2-4:
    start_line: 53
    path: 
      design\kb_and_item.md#design-2-4-item-hierarchy---itemparent-and-child-items
    level: 2
    markdown: "## DESIGN-2-4 Item Hierarchy - `Item.parent` and Child `Item`s\n```yaml
      (data)\nstatus: done\n```\nItems can be nested within eachother in a hierarchy
      based on their Item Key declarations. For example, this item (DESIGN-2-4) is
      nested within DESIGN-2, indicated by the extra `-` in the Item Key number.\n\
      \nWithin the `state.yaml` of a knowledge base, an `Item` will have a `parent`
      field indicating the key of its parent `Item`"
    title: DESIGN-2-4 Item Hierarchy - `Item.parent` and Child `Item`s
    data:
      status: done
      type: DESIGN
    key: DESIGN-2-4
    parent: DESIGN-2
