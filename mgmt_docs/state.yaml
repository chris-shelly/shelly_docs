      the state dictionary and writes `state.yaml`\n  - calls `get_items()`\n- `get_state(path)`\n\
      \  - reads `state.yaml`, returinign it as a dict\n- `get_item()`\n  - gets a
      single item from the state by key\n- `put_item()`\n  - adds or updates an item
      in the markdown file, and updates state\n- `delete_item()`\n  - removes item
      from markdown, updates state\n- `convert_new_item_md()`\n  - wrapper around
      `prep_new_shelly_doc_items_from_document_update()`\n- `get_sibling_positioning(state,
