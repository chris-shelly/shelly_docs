  PROMPT-11-1:
    start_line: 3
    path: 
      prompts\building_unit_tests.md#prompt-11-1-research-how-crud-module-is-used
    level: 2
    end_line: 40
    markdown: "## PROMPT-11-1 Research how `crud` module is Used\n### Role\nYou are
      Senior Python Engineer with extensive experience developing tests for Python
      applications using `pytest`.\n### Goal\nResearch how the functions are used
      in `be/crud.py`.\n### Research Summary (output)\n#### Functions\n- ``get_items()``\n\
      \  - entry point to find .md files, and extract items\n  - calls `process_shelly_docs_items()`\n\
      - `write_items_to_state(path)`\n  - builds the state dictionary and writes `state.yaml`\n\
      \  - calls `get_items()`\n- `get_state(path)`\n  - reads `state.yaml`, returinign
      it as a dict\n- `get_item()`\n  - gets a single item from the state by key\n\
      - `put_item()`\n  - adds or updates an item in the markdown file, and updates
      state\n- `delete_item()`\n  - removes item from markdown, updates state\n- `convert_new_item_md()`\n\
      \  - wrapper around `prep_new_shelly_doc_items_from_document_update()`\n- `get_sibling_positioning(state,
      item)`\n  - finds the insert position among siblings for new child ites\n- `get_md_docs_in_dir()`\n\
      \  - recursively finds `.md` files\n- `parse_md_text()` and `parse_md_doc()`\n\
      \  - markdown-to-ast parsing\n#### Key Obsevations for testing\n- most functions
      depend on filesystem state\n- existing test scaffold\n- two consumers of `crud.py`,
      ``main.py`` and ``tui.py``\n- `put_item()` is among the most complex functions\n\
      - `write_items_to_state()` is called with only `path`\n#### Changes since prompt
      was ran\n- `crud.heading_to_anchor()` has been deleted since it's not used and
      is a duplicates `shelly_doc_processing.heading_to_anchor()`\n\n"
    title: PROMPT-11-1 Research how `crud` module is Used
    data:
    key: PROMPT-11-1
    parent: PROMPT-11
  PROMPT-11-2:
    start_line: 41
